<!doctype html>
<html lang="zh-hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS選擇器</title>
    <!-- 內部樣式表 -->
    <style>
      /* CSS註解符號 */
      /* CSS選擇器 {
      CSS屬性名稱:CSS屬性值;
      CSS屬性名稱:CSS屬性值;
      CSS屬性名稱:CSS屬性值;
      CSS屬性名稱:CSS屬性值;
    } */

      /* 標籤名稱 */
      h1 {
        color: red;
      }
      /* p{
      color: orange;
    } */
      h2 {
        color: red;
      }

      /* 類別選擇器 */
      .p1 {
        color: orange;
      }

      .p2 {
        color: yellowgreen;
      }
    </style>
  </head>
  <body>
    <h1>標題元素 - h1</h1>
    <h2>標題元素 - h2</h2>
    <h2>標題元素 - h2</h2>
    <h2>標題元素 - h2</h2>
    <h2>標題元素 - h2</h2>
    <h2>標題元素 - h2</h2>
    <p class="p1">段落元素-1</p>
    <p class="p2">段落元素-2</p>
  </body>
</html>
