<!doctype html>
<html lang="zh-hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS選擇器</title>
    <!-- 內部樣式表 -->
    <style>
      /* CSS註解符號 */
      /* CSS選擇器 {
      CSS屬性名稱:CSS屬性值;
      CSS屬性名稱:CSS屬性值;
      CSS屬性名稱:CSS屬性值;
      CSS屬性名稱:CSS屬性值;
    } */

      /* 標籤名稱 */
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        color: red;
      }

      /* 類別選擇器 */
      .p1 {
        color: orange;
      }

      .p2 {
        color: yellowgreen;
      }

      /* 結合使用方式 */
      /* 1. 選擇器-1選擇器-2 (全部連在一起) */
      div.box {
        background-color: lightgreen;
      }

      /* 2. 選擇器-1 選擇器-2 (空格) */
      div .box {
        background-color: salmon;
      }

      /* 3. 選擇器-1>選擇器-2 (>符號) */
      div > .box {
        background-color: purple;
      }

      /* div.box p > a {
      } */
    </style>
  </head>
  <body>
    <h1>標題元素 - h1</h1>
    <h2>標題元素 - h2</h2>
    <h2>標題元素 - h2</h2>
    <h2>標題元素 - h2</h2>
    <h2>標題元素 - h2</h2>
    <h2>標題元素 - h2</h2>
    <p class="p1">段落元素-1</p>
    <p class="p2">段落元素-2</p>

    <hr />
    <!-- CSS選擇器指定用法 -->
    <div class="box">div元素身上有class="box"</div>
    <div>
      <p class="box">p元素身上有class="box"</p>
      <p>p元素 <span class="box">span容器身上有class="box"</span></p>
    </div>
  </body>
</html>
