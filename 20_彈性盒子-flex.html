<!doctype html>
<html lang="zh-hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>彈性盒子</title>
    <style>
      .box {
        border: 5px solid red;
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        height: 200px;
      }
      p {
        width: 100px;
        height: 100px;
        border: 5px solid black;
        background-color: lightblue;
        margin: 0;
      }

      .box1{
        display: flex;
        justify-content: center;
        list-style-type: none;
        /* gap: 20px; */
      }

      .box1 li:not(:last-child){
        margin-right: 20px;
        border-right: 1px solid black;
        padding-right: 20px;
      }
    </style>
  </head>
  <body>
    <h1>彈性盒子</h1>
    <div class="box">
      <p>item-1</p>
      <p>item-2</p>
      <p>item-3</p>
    </div>

    <hr>
    <ul class="box1">
      <li>單一項目內容-1</li>
      <li>單一項目內容-2</li>
      <li>單一項目內容-3</li>
      <li>單一項目內容-4</li>
      <li>單一項目內容-5</li>
    </ul>
  </body>
</html>
