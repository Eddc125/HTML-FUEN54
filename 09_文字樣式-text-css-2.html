<!doctype html>
<html lang="zh-hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文字樣式</title>
    <!-- 關聯檔案、外掛、FONTS、ICONS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC&family=Roboto:ital,wdth,wght@0,75..100,100..900;1,75..100,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      /* import google fonts */
      /* @import url('https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC&family=Roboto:ital,wdth,wght@0,75..100,100..900;1,75..100,100..900&display=swap'); */

      @font-face {
        src: url(./fonts/Cursive_Script.ttf);
        font-family: "Cursive_Script";
      }
      .font1 {
        font-family: "標楷體";
      }
      .font2 {
        font-family: "新細明體";
      }

      .font3 {
        font-family: "Cursive_Script";
      }

      .google1 {
        font-family: "LXGW WenKai TC";
      }

      .google2 {
        font-family: "Roboto";
      }

      .font4 {
        font-style: normal;
      }

      .font5 {
        font-style: italic;
      }

      .all {
        /* text-decoration: 線條位置 + 線條樣式 + 線條顏色; */
        /* text-decoration-line: ; */
        /* text-decoration-style: ; */
        text-decoration: overline wavy salmon;
      }
      .none {
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <h1>文字樣式</h1>
    <h2>文字字型</h2>
    <p>正黑體 abcdef 123456</p>
    <p class="font1">標楷體 abcdef 123456</p>
    <p class="font2">新細明體 abcdef 123456</p>
    <p class="font3">中文 Cursive_Script 123456</p>
    <div class="google1">Google Font 字型 123456</div>
    <div class="google2">Google Font 字型 123456</div>
    <h2>文字樣式</h2>
    <p class="font4">段落元素</p>
    <p class="font5">段落元素</p>
    <h2>文字裝飾(速寫) line + style + color</h2>
    <div class="all">區塊容器</div>
    <a href="#" class="none">超連結</a>
  </body>
</html>
