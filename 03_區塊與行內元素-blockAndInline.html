<!DOCTYPE html>
<html lang="zh-hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>區塊與行內元素</title>
</head>
<body>
  <h1>區塊與行內元素</h1>
  <h2>區塊元素</h2>
  <div>區塊容器</div>
  <div style="background-color: lightblue;">區塊容器</div>
  <div>區塊容器</div>
  <hr>
  <h2>行內元素</h2>
  <!-- 延伸輸入鍵: ctrl + alt + 垂直方向鍵 -->
  <span>行內容器</span>
  <span style="background-color: lightblue;">行內容器</span>
  <span>行內容器</span>

</body>
</html>
