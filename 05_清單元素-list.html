<!doctype html>
<html lang="zh-hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>清單元素</title>
  </head>
  <body>
    <h1>清單元素</h1>
    <h2>項目清單(無順序)</h2>
    <ul>
      <li>單一項目內容-1</li>
      <li>單一項目內容-2</li>
      <li>單一項目內容-3</li>
      <li>單一項目內容-4</li>
      <li>單一項目內容-5</li>
    </ul>

    <hr />
    <h2>序號清單(有順序)</h2>
    <ol>
      <!-- emmet: li{單一項目內容-$}*5 -->
      <li>單一項目內容-1</li>
      <li>單一項目內容-2</li>
      <li>單一項目內容-3</li>
      <li>單一項目內容-4</li>
      <li>單一項目內容-5</li>
    </ol>

    <hr />
    <h2>巢狀清單</h2>

    <hr />
    <h2>定義清單</h2>
  </body>
</html>
