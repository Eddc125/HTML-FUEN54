<!doctype html>
<html lang="zh-hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML5 新增控制項</title>
    <link rel="stylesheet" href="./styles/form.css" />
  </head>
  <body>
    <h1>HTML5 新增控制項</h1>
    <form action="#">
      <fieldset>
        <legend>日期控制項</legend>
        <div class="q1">
          <label for="date" class="t1">date</label>
          <input
            type="date"
            name="userDate"
            id="date"
            value="2026-07-23"
            min="2026-07-22"
            max="2026-08-04"
          />
        </div>
        <div class="q1">
          <label for="datetime-local" class="t1">datetime-local</label>
          <input
            type="datetime-local"
            name="userDatetime-local"
            id="datetime-local"
            min="2026-07-22T18:00"
            max="2026-07-25T18:00"
          />
        </div>
        <div class="q1">
          <label for="time" class="t1">time</label>
          <input
            type="time"
            name="userTime"
            id="time"
            min="09:00"
            max="16:30"
            value="12:00"
          />
        </div>
        <div class="q1">
          <label for="month" class="t1">month</label
          ><input
            type="month"
            name="userMonth"
            id="month"
            min="2026-02"
            max="2026-11"
          />
        </div>
        <div class="q1">
          <label for="week" class="t1">week</label>
          <input
            type="week"
            name="userWeek"
            id="week"
            min="2026-W04"
            max="2026-W12"
          />
        </div>
      </fieldset>
      <fieldset>
        <legend>文字輸入控制項</legend>
        <!-- 一次性驗證碼 -->
        <!-- <input type="text" name="one-time-code" id="" inputmode="tel"> -->
        <div class="q1">
          <label for="email" class="t1">email</label>
          <input
            type="email"
            name="userEmail"
            id="email"
            required
            autofocus
            autocomplete="email"
          />
        </div>
        <div class="q1">
          <label for="url" class="t1">url</label>
          <input
            type="url"
            name="userUrl"
            id="url"
            placeholder="https://www.google.com"
            value="https://www.google.com"
            readonly
          />
        </div>
        <div class="q1">
          <label for="tel" class="t1">tel</label
          ><input
            type="tel"
            name="userTel"
            id="tel"
            pattern="^[0][9]\d{8}$"
            maxlength="10"
            required
          />
        </div>
        <div class="q1">
          <label for="search" class="t1">search</label>
          <input type="search" name="userSearch" id="search" />
        </div>
      </fieldset>
      <fieldset>
        <legend>其餘控制項</legend>
        <div class="q1">
          <label for="color" class="t1">color</label>
          <input type="color" name="userColor" value="#19bd53" id="color" />
        </div>
        <div class="q1">
          <label for="range" class="t1">range</label>
          <input
            type="range"
            name="userRange"
            id="range"
            value="80"
            min="0"
            max="100"
            step="20"
          />
        </div>
        <div class="q1">
          <label for="number" class="t1">number</label>
          <input
            type="number"
            name="userNumber"
            id="number"
            value="15"
            min="0"
            max="30"
            step="5"
          />
        </div>
      </fieldset>
      <div class="btns">
        <button type="submit">送出</button>
      </div>
    </form>
  </body>
</html>
