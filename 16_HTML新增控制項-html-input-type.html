<!doctype html>
<html lang="zh-hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML5 新增控制項</title>
    <link rel="stylesheet" href="./styles/form.css" />
  </head>
  <body>
    <h1>HTML5 新增控制項</h1>
    <form action="#">
      <fieldset>
        <legend>日期控制項</legend>
        <div class="q1">
          <label for="date" class="t1">date</label>
          <input
            type="date"
            name="userDate"
            id="date"
            value="2026-07-23"
            min="2026-07-22"
            max="2026-08-04"
          />
        </div>
        <div class="q1">
          <label for="datetime-local" class="t1">datetime-local</label>
          <input
            type="datetime-local"
            name="userDatetime-local"
            id="datetime-local"
            min="2026-07-22T18:00"
            max="2026-07-25T18:00"
          />
        </div>
        <div class="q1">
          <label for="time" class="t1">time</label>
          <input
            type="time"
            name="userTime"
            id="time"
            min="09:00"
            max="16:30"
          />
        </div>
        <div class="q1">
          <label for="month" class="t1">month</label
          ><input
            type="month"
            name="userMonth"
            id="month"
            mix="2026-02"
            max="2026-11"
          />
        </div>
        <div class="q1">
          <label for="week" class="t1">week</label>
          <input
            type="week"
            name="userWeek"
            id="week"
            min="2026-04"
            max="2026-12"
          />
        </div>
      </fieldset>
      <div class="btns">
        <button type="submit">送出</button>
      </div>
    </form>
  </body>
</html>
