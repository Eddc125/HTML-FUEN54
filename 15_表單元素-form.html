<!doctype html>
<html lang="zh-hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>表單元素</title>
    <link rel="stylesheet" href="./styles/form.css" />
  </head>
  <body>
    <h1>表單元素</h1>
    <!-- ?key=value&key=value -->
    <form action="#" method="get" enctype="multipart/form-data">
      <div class="q1">
        <!-- 單行文字 -->
        <label for="myName" class="t1">姓名</label>
        <input
          type="text"
          name="userName"
          value="王大明"
          placeholder="請輸入您的姓名"
          id="myName"
        />
      </div>
      <div class="q1">
        <!-- 密碼 -->
        <label for="myPassword" class="t1">密碼</label>
        <input
          type="password"
          name="userPassword"
          id="myPassword"
          value="123456"
          placeholder="請輸入6-8位數字密碼"
          maxlength="8"
          minlength="6"
        />
      </div>

      <div class="q1">
        <!-- 多行文字 -->
        <label for="myMemo" class="t1">備忘錄</label>
        <textarea
          name="userMemo"
          id="myMemo"
          placeholder="提示文字"
          maxlength="100"
          cols="30"
          rows="10"
        >
  預設文字</textarea
        >
      </div>

      <div class="q1">
        <span class="t1">性別</span>
        <input type="radio" name="userGender" value="male" id="male" /><label
          for="male"
          >男性</label
        >
        <input
          type="radio"
          name="userGender"
          value="female"
          id="female"
        /><label for="female">女性</label>
        <input
          type="radio"
          name="userGender"
          value="hidden"
          id="hidden"
          checked
        /><label for="hidden">不顯示</label>
      </div>

      <div class="q1">
        <span class="t1">複選題</span>
        <!-- (input:checkbox[id=checkbox$][name=userCheckbox][value=option$]+lable[for=checkbox$]{選項$})*4 -->
        <input
          type="checkbox"
          name="userCheckbox"
          id="checkbox1"
          value="option1"
        />
        <lable for="checkbox1">選項1</lable>
        <input
          type="checkbox"
          name="userCheckbox"
          id="checkbox2"
          value="option2"
        />
        <lable for="checkbox2">選項2</lable>
        <input
          type="checkbox"
          name="userCheckbox"
          id="checkbox3"
          value="option3"
        />
        <lable for="checkbox3">選項3</lable>
        <input
          type="checkbox"
          name="userCheckbox"
          id="checkbox4"
          value="option4"
        />
        <lable for="checkbox4">選項4</lable>
      </div>

      <!-- https://codepen.io/pamcy/pen/Jvmavx -->
      <div class="q1">
        <label for="myCity" class="t1">縣市</label>
        <select name="userCity" id="myCity">
          <!-- <select name="userCity" id="myCity" multiple size="7"> -->
          <!-- option[value=city$]{縣市$}*6 -->
          <option value="default" hidden>請選擇</option>
          <option value="city1">縣市1</option>
          <option value="city2">縣市2</option>
          <option value="city3" selected>縣市3</option>
          <option value="city4">縣市4</option>
          <option value="city5">縣市5</option>
          <option value="city6">縣市6</option>
        </select>
      </div>

      <div class="q1">
        <label for="myFile" class="t1">檔案上傳</label>
        <input type="file" name="userFile" id="myFile" multiple />
      </div>

      <div class="btns">
        <!-- 按鈕 -->
        <!-- <input type="submit" value="送出" /> -->
        <!-- <input type="reset"  /> -->
        <button type="submit">送出</button>
        <button type="reset">清除</button>
        <input type="button" value="一般按鈕" />
        <button type="button">一般按鈕</button>
      </div>
    </form>
  </body>
</html>
