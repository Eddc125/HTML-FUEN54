<!doctype html>
<html lang="zh-hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>表單元素</title>
    <link rel="stylesheet" href="./styles/form.css" />
  </head>
  <body>
    <h1>表單元素</h1>
    <form action="#" method="get" enctype="application/x-www-form-urlencoded">
      <!-- 單行文字 -->
      <label for="myName">姓名</label>
      <input
        type="text"
        name="userName"
        value="王大明"
        placeholder="請輸入您的姓名"
        id="myName"
      />
      <br />
      <!-- 密碼 -->
      <label for="myPassword">密碼</label>
      <input
        type="password"
        name="userPassword"
        id="myPassword"
        value="123456"
        placeholder="請輸入6-8位數字密碼"
        maxlength="8"
        minlength="6"
      />

    </form>
  </body>
</html>
