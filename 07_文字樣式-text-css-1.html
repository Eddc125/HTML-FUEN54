<!doctype html>
<html lang="zh-hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文字樣式</title>
  </head>
  <body>
    <h1>文字樣式</h1>
    <h2>文字顏色</h2>
    <p style="color: #008b8b">段落元素</p>
    <p style="color: rgb(220, 20, 60)">段落元素</p>
    <p style="color: rgb(168, 17, 6)">段落元素</p>

    <h2>文字大小</h2>
    <span style="font-size: 40px">行內容器 - 40px</span>
    <span style="font-size: 8px">行內容器 - 8px</span>
    <span style="font-size: 70%">行內容器 - 70%</span>
    <span style="color: red">行內容器 (預設)</span>
    <!-- 16 * 2 = 32 -->
    <span style="font-size: 2em">行內容器 - 2em</span>
    <span style="font-size: 2rem">行內容器 - 2rem</span>
    <hr />
    <div style="font-size: 50px">
      <span style="font-size: 40px">行內容器 - 40px</span>
      <span style="font-size: 8px">行內容器 - 8px</span>
      <span style="font-size: 70%">行內容器 - 70%</span>
      <span style="color: red">行內容器 (預設) ==> 50px</span>
      <!-- 16 * 2 = 32 -->
      <span style="font-size: 2em">行內容器 - 2em</span>
      <span style="font-size: 2rem">行內容器 - 2rem</span>
    </div>
    <hr />
    <div style="font-size: 5em">
      <span style="font-size: 40px">行內容器 - 40px</span>
      <span style="font-size: 8px">行內容器 - 8px</span>
      <span style="font-size: 70%">行內容器 - 70%</span>
      <span style="color: red">行內容器 (預設) ==> 50px</span>
      <span style="font-size: 2em">行內容器 - 2em</span>
      <span style="font-size: 2rem">行內容器 - 2rem</span>
    </div>
    <hr />
    <p style="font-size: 1vw">相對單位 vw</p>
    <p style="font-size: 1vh">相對單位 vh</p>

    <h2>文字粗細</h2>
    <p style="font-weight: 100; font-size: 50px">段落元素</p>
  </body>
</html>
